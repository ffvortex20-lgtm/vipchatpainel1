<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX ADMIN - CONTROL PANEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020b1a; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        .header { border-bottom: 2px solid #1a73e8; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(26, 115, 232, 0.3); border-radius: 10px; margin-bottom: 25px; }
        
        /* Barra de Link Corrigida */
        .link-container { background: rgba(13, 25, 48, 0.9); border: 1px solid #1a73e8; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 30px; box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .link-container input { flex: 1; background: #000; border: 1px solid #333; color: #00ff00; padding: 12px; border-radius: 5px; font-family: monospace; font-size: 14px; }
        
        .btn-action { background: linear-gradient(90deg, #1a73e8, #00d2ff); border: none; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 15px #1a73e8; }
        
        .card { background: rgba(13, 25, 48, 0.8); border: 1px solid #1a73e8; padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 25px; margin-bottom: 20px; animation: fadeIn 0.5s ease-in; }
        .card img { width: 180px; height: 110px; object-fit: cover; border-radius: 8px; border: 2px solid #1a73e8; cursor: pointer; transition: 0.3s; }
        .card img:hover { transform: scale(1.1); border-color: #00ff00; }
        
        .info-user { flex: 1; }
        .info-user b { color: #00d2ff; }
        .plano-tag { color: #00ff00; font-size: 20px; text-shadow: 0 0 5px #00ff00; }
        
        .btn-approve { background: #28a745; box-shadow: 0 0 10px rgba(40, 167, 69, 0.5); }
        .btn-logout { background: #ff4b2b; font-size: 12px; padding: 8px 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size: 1.2em;">VORTEX PANEL ADMIN</h2>
        <button class="btn-action btn-logout" onclick="firebase.auth().signOut()">Sair</button>
    </div>

    <div class="link-container">
        <span style="font-size: 0.8em; color: #5fb9ff;">URL DO CHAT:</span>
        <input type="text" id="chatLinkInput" readonly>
        <button class="btn-action" onclick="copiarLink()">Copiar Link</button>
    </div>

    <h3 style="color: #5fb9ff; border-left: 4px solid #1a73e8; padding-left: 10px;">Solicitações de Entrada</h3>
    <div id="solicitacoes-lista">Aguardando dados...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
        authDomain: "vortexdev2.firebaseapp.com",
        databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
        projectId: "vortexdev2",
        storageBucket: "vortexdev2.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Lógica para gerar o link correto do chat.html
    window.onload = function() {
        let path = window.location.pathname;
        let directory = path.substring(0, path.lastIndexOf('/'));
        let fullUrl = window.location.origin + directory + "/chat.html";
        document.getElementById('chatLinkInput').value = fullUrl;
    };

    function copiarLink() {
        const input = document.getElementById('chatLinkInput');
        navigator.clipboard.writeText(input.value);
        alert("Link do Chat copiado! Agora mande para seus clientes.");
    }

    // Login Admin Automático
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            if (user.email === 'ffvortex20@gmail.com') {
                carregarSolicitacoes();
            } else {
                document.body.innerHTML = "<h1 style='color:red;text-align:center;'>ACESSO NEGADO</h1>";
            }
        } else {
            firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }
    });

    function carregarSolicitacoes() {
        db.ref('solicitacoes').on('value', snap => {
            const container = document.getElementById('solicitacoes-lista');
            container.innerHTML = "";
            if (!snap.exists()) container.innerHTML = "<h4>Nenhuma solicitação nova.</h4>";

            snap.forEach(userNode => {
                userNode.forEach(item => {
                    const data = item.val();
                    container.innerHTML += `
                        <div class="card">
                            <img src="${data.fotoUrl}" onclick="window.open('${data.fotoUrl}')">
                            <div class="info-user">
                                <b>CLIENTE:</b> ${data.nome}<br>
                                <b>PLANO:</b> <span class="plano-tag">${data.dias} DIAS</span><br>
                                <small>Email: ${data.email}</small>
                            </div>
                            <button class="btn-action btn-approve" onclick="liberarKey('${userNode.key}', '${data.dias}', '${item.key}')">GERAR KEY</button>
                        </div>
                    `;
                });
            });
        });
    }

    function liberarKey(uid, dias, msgKey) {
        // Gera os 4 números aleatórios igual à foto
        const num = Math.floor(1000 + Math.random() * 9000);
        const fullKey = "VTX-VIP-" + num;

        db.ref('respostas/' + uid).push({
            senha: num,
            dias: dias,
            timestamp: Date.now()
        }).then(() => {
            db.ref(`solicitacoes/${uid}/${msgKey}`).remove();
            alert("Sucesso! Key " + fullKey + " enviada.");
        });
    }
</script>
</body>
</html>
