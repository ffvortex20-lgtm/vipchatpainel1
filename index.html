<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - VORTEX CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020b1a; color: white; font-family: sans-serif; padding: 20px; }
        .header { border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .link-copia { background: #0d1930; padding: 15px; border-radius: 10px; border: 1px dashed #1a73e8; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .card { background: #0d1930; border: 1px solid #1a73e8; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; }
        img { width: 150px; border-radius: 8px; border: 1px solid #1a73e8; cursor: pointer; }
        button { background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gerar { background: #28a745; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="header">
        <h2>SISTEMA DE APROVAÇÃO VORTEX</h2>
        <button onclick="firebase.auth().signOut()">SAIR</button>
    </div>

    <div class="link-copia">
        <strong>LINK DO CLIENTE:</strong>
        <input type="text" id="linkChat" readonly style="flex:1; background: #000; color: #00ff00; border: none; padding: 5px;">
        <button onclick="copiar()">COPIAR</button>
    </div>

    <div id="lista">Carregando solicitações...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
        authDomain: "vortexdev2.firebaseapp.com",
        databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
        projectId: "vortexdev2",
        storageBucket: "vortexdev2.firebasestorage.app"
    };
    firebase.initializeApp(firebaseConfig);

    document.getElementById('linkChat').value = window.location.href.replace('index.html', 'chat.html');

    function copiar() {
        const inp = document.getElementById('linkChat');
        inp.select();
        document.execCommand('copy');
        alert("Copiado!");
    }

    firebase.auth().onAuthStateChanged(user => {
        if (user && user.email === 'ffvortex20@gmail.com') {
            carregar();
        } else if (!user) {
            firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
        } else {
            document.body.innerHTML = "<h1>Acesso negado para " + user.email + "</h1>";
        }
    });

    function carregar() {
        firebase.database().ref('solicitacoes').on('value', snap => {
            const list = document.getElementById('lista');
            list.innerHTML = "";
            snap.forEach(userNode => {
                userNode.forEach(item => {
                    const data = item.val();
                    list.innerHTML += `
                        <div class="card">
                            <img src="${data.fotoUrl}" onclick="window.open('${data.fotoUrl}')">
                            <div style="flex:1">
                                <b>Cliente:</b> ${data.nome}<br>
                                <b>Plano:</b> ${data.dias} Dias
                            </div>
                            <button class="btn-gerar" onclick="gerar('${userNode.key}', '${data.dias}', '${item.key}')">APROVAR E ENVIAR KEY</button>
                        </div>
                    `;
                });
            });
        });
    }

    function gerar(uid, dias, key) {
        const random = Math.floor(1000 + Math.random() * 9000); // 4 digitos igual sua foto
        firebase.database().ref('respostas/' + uid).push({ senha: random, dias: dias });
        firebase.database().ref(`solicitacoes/${uid}/${key}`).remove();
        alert("Key VTX-VIP-" + random + " enviada!");
    }
</script>
</body>
</html>
